<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport : viewport-fit=cover pour gérer l'encoche/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA de base -->
    <meta name="theme-color" content="#111111" />
    <link rel="manifest" href="manifest.json" />

    <!-- iOS PWA — CRITIQUE pour le comportement natif -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Muscu" />

    <!-- Icônes Apple Touch (remplace les PNG par tes vraies icônes) -->
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />

    <!-- Splash screens iOS (optionnel mais pro) -->
    <!-- iPhone 14 Pro Max -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="splash/splash-1290x2796.png"
    />

    <!-- Favicon standard -->
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />

    <!-- Désactiver le zoom Google Maps style (double tap) -->
    <!-- Géré via CSS touch-action: manipulation dans index.css -->

    <!-- Formatage des numéros de téléphone désactivé -->
    <meta name="format-detection" content="telephone=no" />

    <title>Muscu Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
